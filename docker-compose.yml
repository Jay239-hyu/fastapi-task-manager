services:
  db:
    image: postgres:16-alpine 
    container_name: taskmanager_db
    restart: always
    environment: 
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes: 
      - postgres_data:/var/lib/postgresql/data # Docker : Postgres
    ports:
      - "5432:5432" # Host machine:5432 → Container:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5


  backend:
    build: .
    container_name: taskmanager_backend
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:              
      - .:/app # Host project folder → container /app
    command: /app/entrypoint.sh
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: taskmanager_nginx
    restart: always
    ports:
      - "80:80" # Browser → localhost:80 → nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
     

volumes:
  postgres_data:
    




